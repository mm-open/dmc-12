name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run only on schedule (drift catches Worker config rot)
    - cron: "17 6 * * *"

permissions:
  contents: read

jobs:
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ajv-cli
        run: npm install -g ajv-cli@5 ajv-formats@3
      - name: Validate each schema compiles against JSON Schema 2020-12
        run: |
          set -euo pipefail
          fail=0
          # The v0.2 schemas use $ref to common.json; ajv must be told about
          # the referenced schema with -r or compilation fails on every
          # schema that references shared $defs (offer, counter, acceptance,
          # rejection, pricing_disclosure, negotiation_policy).
          for s in schemas/*.json; do
            echo "--- $s"
            if [ "$s" = "schemas/common.json" ]; then
              ajv compile -s "$s" --spec=draft2020 --strict=false -c ajv-formats || fail=$((fail+1))
            else
              ajv compile -s "$s" -r schemas/common.json --spec=draft2020 --strict=false -c ajv-formats || fail=$((fail+1))
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::$fail schema(s) failed to compile"
            exit 1
          fi

  reference-manifest:
    runs-on: ubuntu-latest
    needs: schemas
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Structural check on the reference manifest
        run: python3 .github/workflows/check_manifest.py

  dmc12-ai-drift:
    # Run only on schedule (drift catches Worker config rot)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: schemas
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify dmc12.ai serves repo content (Worker drift check)
        run: python3 .github/workflows/check_dmc12_ai_drift.py
